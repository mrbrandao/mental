version: 2

project_name: mental

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: mental
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/mrbrandao/mental/cmd.version={{.Version}}
    flags:
      - -trimpath

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

# Use GitHub's native release notes generator.
# This produces the same output as `gh release create --generate-notes`:
# PR titles grouped by labels, contributor attribution, full compare link.
changelog:
  use: github-native
