# cliff.toml — git-cliff configuration for CHANGELOG.md generation.
#
# git-cliff reads conventional commits and produces CHANGELOG.md
# in Keep a Changelog format (https://keepachangelog.com).
#
# Usage:
#   git-cliff --tag v0.2.0 -o CHANGELOG.md   # generate for a tag
#   git-cliff -o CHANGELOG.md                # generate for latest commits
#
# The release CI workflow runs this automatically before goreleaser.

[changelog]
# Header appears once at the top of CHANGELOG.md.
header = """
# Changelog

All notable changes to mental are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).

"""

# Body template for each release section.
# Uses Tera templating (https://keats.github.io/tera/).
body = """
## [{{ version | trim_start_matches(pat="v") }}] \
- {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}\
{% if commit.breaking %} (**BREAKING**){% endif %}
{% endfor %}
{% endfor %}
"""

# Footer appears at the end of CHANGELOG.md.
footer = ""

# Remove leading and trailing whitespace from the template output.
trim = true

[git]
# Only process commits that follow Conventional Commits specification.
conventional_commits = true

# Filter commits that match these patterns — map each to a changelog group.
# Groups map to Keep a Changelog sections: Added, Changed, Fixed, etc.
commit_parsers = [
  # Breaking changes always go first.
  { message = "^.*!:", group = "⚠ Breaking Changes" },
  { body = ".*BREAKING CHANGE.*", group = "⚠ Breaking Changes" },
  # Standard conventional commit types.
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^revert", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  # Skip noise — these don't belong in the user-facing changelog.
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
]

# Include commits with no conventional prefix under "Changed".
filter_unconventional = false

# Split commits on newlines to handle multi-line commit messages.
split_commits = false

# Sort commits within each group by date (newest first).
sort_commits = "oldest"
